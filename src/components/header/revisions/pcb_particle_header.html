<canvas id="c" style="width:100%;height:520px;display:block;border-radius:12px;background:#070d18;cursor:crosshair;"></canvas>
<div style="position:relative;margin-top:-48px;text-align:center;pointer-events:none;">
  <p style="color:rgba(100,160,220,0.4);font-size:12px;letter-spacing:2px;font-family:monospace;">HOVER · CLICK · EXPLORE</p>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, dpr;
let traces = [], floaters = [], pulses = [], blooms = [];
let mouse = {x:-999,y:-999};
let frame = 0;

function rw(){return W/dpr;} function rh(){return H/dpr;}

function resize(){
  const rect = canvas.getBoundingClientRect();
  dpr = Math.min(devicePixelRatio,2);
  W = canvas.width = rect.width*dpr;
  H = canvas.height = rect.height*dpr;
  ctx.scale(dpr,dpr);
  buildTraces();
}

// --- PCB TRACE NETWORK ---
function buildTraces(){
  traces = [];
  const cw=rw(), ch=rh();
  const cols=10, rows=6;
  const gx=cw/cols, gy=ch/rows;
  let nodes=[];
  for(let r=0;r<=rows;r++) for(let c=0;c<=cols;c++){
    const jx=(Math.random()-0.5)*gx*0.4, jy=(Math.random()-0.5)*gy*0.4;
    nodes.push({x:gx*c+jx, y:gy*r+jy});
  }
  const used=new Set();
  for(let i=0;i<nodes.length;i++){
    const n=nodes[i];
    const nearby=nodes.map((m,j)=>({j,d:Math.hypot(m.x-n.x,m.y-n.y)}))
      .filter(o=>o.j!==i&&o.d<gx*1.8)
      .sort((a,b)=>a.d-b.d).slice(0,3);
    for(const {j} of nearby){
      const key=i<j?`${i}-${j}`:`${j}-${i}`;
      if(used.has(key)) continue;
      used.add(key);
      const a=nodes[i], b=nodes[j];
      // orthogonal elbow: go horizontal first, then vertical
      const elbow = Math.random()>0.5
        ? [{x:a.x,y:a.y},{x:b.x,y:a.y},{x:b.x,y:b.y}]
        : [{x:a.x,y:a.y},{x:a.x,y:b.y},{x:b.x,y:b.y}];
      traces.push({pts:elbow, lit:0, dormant:1, lastHit:-9999, id:traces.length});
    }
  }
}

// --- FLOATERS (from original tsparticles spirit) ---
class Floater {
  constructor(x,y,color){
    this.x=x; this.y=y;
    this.vx=(Math.random()-0.5)*0.6; this.vy=(Math.random()-0.5)*0.6;
    this.r=Math.random()*2+1.5;
    this.alpha=0; this.targetAlpha=0.9;
    this.color=color||'#7ab8f5';
    this.age=0; this.life=400+Math.random()*300;
    this.links=[];
  }
  update(){
    this.x+=this.vx; this.y+=this.vy;
    this.age++;
    this.alpha+=(this.targetAlpha-this.alpha)*0.05;
    if(this.age>this.life-60) this.targetAlpha=0;
    const cw=rw(),ch=rh();
    if(this.x<0||this.x>cw) this.vx*=-1;
    if(this.y<0||this.y>ch) this.vy*=-1;
    return this.age<this.life;
  }
  draw(){
    ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fillStyle=this.color+Math.floor(this.alpha*255).toString(16).padStart(2,'0');
    ctx.fill();
    if(this.alpha>0.4){
      ctx.beginPath(); ctx.arc(this.x,this.y,this.r*3,0,Math.PI*2);
      ctx.fillStyle=this.color+Math.floor(this.alpha*40).toString(16).padStart(2,'0');
      ctx.fill();
    }
  }
}

// draw links between floaters
function drawFloaterLinks(){
  const maxD=130;
  for(let i=0;i<floaters.length;i++){
    for(let j=i+1;j<floaters.length;j++){
      const a=floaters[i],b=floaters[j];
      const d=Math.hypot(a.x-b.x,a.y-b.y);
      if(d<maxD){
        const alpha=(1-d/maxD)*Math.min(a.alpha,b.alpha)*0.4;
        ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
        ctx.strokeStyle=`rgba(80,160,255,${alpha})`;
        ctx.lineWidth=0.7; ctx.stroke();
      }
    }
  }
}

// --- ELECTRICAL PULSE along trace ---
class TracePulse {
  constructor(trace){
    this.pts=trace.pts;
    this.t=0;
    this.len=pathLen(this.pts);
    this.speed=this.len/55;
    this.done=false;
    this.trace=trace;
  }
  update(){
    this.t+=this.speed;
    if(this.t>=this.len){ this.done=true; this.spawnBloom(); }
  }
  spawnBloom(){
    const end=this.pts[this.pts.length-1];
    blooms.push(new Bloom(end.x,end.y));
    const colors=['#7ab8f5','#a0d4ff','#4fc3f7','#81d4fa'];
    for(let i=0;i<6;i++){
      floaters.push(new Floater(
        end.x+(Math.random()-0.5)*30,
        end.y+(Math.random()-0.5)*30,
        colors[Math.floor(Math.random()*colors.length)]
      ));
    }
  }
  draw(){
    const pos=pointAtDist(this.pts,this.t);
    if(!pos) return;
    // glow head
    const g=ctx.createRadialGradient(pos.x,pos.y,0,pos.x,pos.y,12);
    g.addColorStop(0,'rgba(200,230,255,0.95)');
    g.addColorStop(0.3,'rgba(100,180,255,0.5)');
    g.addColorStop(1,'rgba(50,120,255,0)');
    ctx.beginPath(); ctx.arc(pos.x,pos.y,12,0,Math.PI*2);
    ctx.fillStyle=g; ctx.fill();
    // hot core
    ctx.beginPath(); ctx.arc(pos.x,pos.y,2.5,0,Math.PI*2);
    ctx.fillStyle='#ffffff'; ctx.fill();
  }
}

// --- BLOOM at endpoint ---
class Bloom {
  constructor(x,y){
    this.x=x; this.y=y; this.age=0; this.life=45;
    this.rings=[0.3,0.6,1.0].map(s=>({r:0,maxR:40*s,alpha:0.9}));
  }
  update(){ this.age++; return this.age<this.life; }
  draw(){
    const p=this.age/this.life;
    for(const ring of this.rings){
      ring.r=ring.maxR*p;
      const a=ring.alpha*(1-p);
      ctx.beginPath(); ctx.arc(this.x,this.y,ring.r,0,Math.PI*2);
      ctx.strokeStyle=`rgba(150,210,255,${a})`;
      ctx.lineWidth=1.5; ctx.stroke();
    }
    if(p<0.3){
      ctx.beginPath(); ctx.arc(this.x,this.y,6*(1-p/0.3),0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${0.9*(1-p/0.3)})`; ctx.fill();
    }
  }
}

// --- PATH MATH ---
function pathLen(pts){
  let l=0;
  for(let i=1;i<pts.length;i++) l+=Math.hypot(pts[i].x-pts[i-1].x,pts[i].y-pts[i-1].y);
  return l;
}
function pointAtDist(pts,dist){
  let acc=0;
  for(let i=1;i<pts.length;i++){
    const seg=Math.hypot(pts[i].x-pts[i-1].x,pts[i].y-pts[i-1].y);
    if(acc+seg>=dist){
      const t=(dist-acc)/seg;
      return {x:pts[i-1].x+(pts[i].x-pts[i-1].x)*t, y:pts[i-1].y+(pts[i].y-pts[i-1].y)*t};
    }
    acc+=seg;
  }
  return pts[pts.length-1];
}
function distToSegment(px,py,ax,ay,bx,by){
  const dx=bx-ax,dy=by-ay,l2=dx*dx+dy*dy;
  if(l2===0) return Math.hypot(px-ax,py-ay);
  const t=Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/l2));
  return Math.hypot(px-(ax+t*dx),py-(ay+t*dy));
}
function distToTrace(mx,my,trace){
  let min=Infinity;
  for(let i=1;i<trace.pts.length;i++)
    min=Math.min(min,distToSegment(mx,my,trace.pts[i-1].x,trace.pts[i-1].y,trace.pts[i].x,trace.pts[i].y));
  return min;
}

// --- DRAW TRACES ---
function drawTraces(){
  const now=frame;
  for(const tr of traces){
    const timeSince=now-tr.lastHit;
    // dormancy: fade to dim after 180 frames
    tr.lit=Math.max(0, tr.lit - 0.012);
    const base=0.06, hoverAdd=tr.lit*0.55;
    const alpha=base+hoverAdd;
    // draw segments
    ctx.beginPath();
    ctx.moveTo(tr.pts[0].x,tr.pts[0].y);
    for(let i=1;i<tr.pts.length;i++) ctx.lineTo(tr.pts[i].x,tr.pts[i].y);
    ctx.strokeStyle=`rgba(20,90,160,${alpha})`;
    ctx.lineWidth=tr.lit>0.3?1.2:0.7; ctx.stroke();
    // lit glow layer
    if(tr.lit>0.1){
      ctx.beginPath();
      ctx.moveTo(tr.pts[0].x,tr.pts[0].y);
      for(let i=1;i<tr.pts.length;i++) ctx.lineTo(tr.pts[i].x,tr.pts[i].y);
      ctx.strokeStyle=`rgba(80,180,255,${tr.lit*0.5})`;
      ctx.lineWidth=2.5; ctx.stroke();
    }
    // via dots at corners
    for(const pt of tr.pts){
      ctx.beginPath(); ctx.arc(pt.x,pt.y,1.5,0,Math.PI*2);
      ctx.fillStyle=`rgba(60,140,220,${alpha*2})`; ctx.fill();
    }
  }
}

// --- HOVER ---
canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  mouse.x=e.clientX-rect.left; mouse.y=e.clientY-rect.top;
  for(const tr of traces){
    const d=distToTrace(mouse.x,mouse.y,tr);
    if(d<30){
      tr.lit=Math.min(1,tr.lit+0.08*(1-d/30));
      tr.lastHit=frame;
    }
  }
});
canvas.addEventListener('mouseleave',()=>{ mouse.x=-999; mouse.y=-999; });

// --- CLICK ---
canvas.addEventListener('click',e=>{
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  // find closest trace
  let best=null, bestD=Infinity;
  for(const tr of traces){
    const d=distToTrace(mx,my,tr);
    if(d<bestD){ bestD=d; best=tr; }
  }
  if(best && bestD<80){
    best.lit=1; best.lastHit=frame;
    pulses.push(new TracePulse(best));
  }
  // also add a free floater at click point
  floaters.push(new Floater(mx,my,'#a0d4ff'));
});

// --- LOOP ---
function loop(){
  requestAnimationFrame(loop);
  const cw=rw(), ch=rh();
  ctx.clearRect(0,0,cw,ch);
  frame++;

  drawTraces();
  drawFloaterLinks();
  floaters=floaters.filter(f=>f.update());
  floaters.forEach(f=>f.draw());
  pulses=pulses.filter(p=>{ p.update(); p.draw(); return !p.done; });
  blooms=blooms.filter(b=>{ b.update(); b.draw(); return b.age<b.life; });

  // ambient random hover flicker
  if(frame%240===0 && traces.length){
    const tr=traces[Math.floor(Math.random()*traces.length)];
    tr.lit=Math.min(tr.lit+0.2,0.4);
  }
}

window.addEventListener('resize',()=>{
  ctx.setTransform(1,0,0,1,0,0);
  resize();
});
setTimeout(resize,50);
loop();
</script>
